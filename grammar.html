<!DOCTYPE html>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spoken English Course</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background: linear-gradient(135deg,#e0e7ff,#f0f9ff);
    min-height:100vh;
}

/* HEADER */
header{
    background: linear-gradient(90deg,#2563eb,#4f46e5);
    color:white;
    padding:18px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

/* SEARCH */
#search{
    width:90%;
    max-width:600px;
    display:block;
    margin:18px auto;
    padding:12px;
    border-radius:12px;
    border:1px solid #ccc;
    outline:none;
    font-size:16px;
}

/* DROPDOWN WRAPPER */
.dropdown{
    width:90%;
    max-width:600px;
    margin:10px auto;
}

/* SELECT */
select{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:none;
    font-size:16px;
    background:#2563eb;
    color:white;
    outline:none;
    cursor:pointer;
}

/* LESSON BOX */
#box{
    width:90%;
    max-width:800px;
    margin:25px auto;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    padding:22px;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    display:none;
    animation:fadeIn 0.4s ease;
}

#box h2{
    color:#2563eb;
    font-size:22px;
}

.lesson-item{
    padding:8px 0;
    border-bottom:1px solid #eee;
    font-size:16px;
}

.lesson-item:hover{
    color:#4f46e5;
    padding-left:8px;
}

/* ANIMATION */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

/* 🔥 RESPONSIVE DESIGN */
@media (max-width:768px){
    header{
        font-size:18px;
        padding:14px;
    }

    #search{
        font-size:14px;
        padding:10px;
    }

    select{
        font-size:14px;
        padding:12px;
    }

    #box{
        padding:16px;
    }

    #box h2{
        font-size:18px;
    }

    .lesson-item{
        font-size:14px;
    }
}

@media (max-width:480px){
    header{
        font-size:16px;
    }

    #search, select{
        width:95%;
    }

    #box{
        width:95%;
        margin:15px auto;
    }
}
</style>
</head>

const box = document.getElementById("box");
const select = document.getElementById("topicSelect");

function loadDropdown(filter=""){
    select.innerHTML = `<option value="">-- Select Topic --</option>`;

    Object.keys(lessons)
    .filter(t => t.toLowerCase().includes(filter.toLowerCase()))
    .forEach(t=>{
        let opt = document.createElement("option");
        opt.value = t;
        opt.innerText = t;
        select.appendChild(opt);
    });
}

loadDropdown();

function speak(text){
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-US";
    speech.rate = 0.9;
    speech.pitch = 1;
    window.speechSynthesis.speak(speech);
}

function showLesson(title){
    if(!title) return;

    box.style.display = "block";
    box.innerHTML = `
        <h2>${title}</h2>
        ${lessons[title].map(i => `
            <div class="lesson-item">
                ✔ ${i}
                <button onclick="speak('${i}')" 
                style="
                    margin-left:10px;
                    padding:5px 10px;
                    border:none;
                    border-radius:8px;
                    background:#10b981;
                    color:white;
                    cursor:pointer;
                ">
                    🔊 Speak
                </button>
            </div>
        `).join("")}
    `;
}

select.addEventListener("change", e=>{
    showLesson(e.target.value);
});

document.getElementById("search").addEventListener("input", e=>{
    loadDropdown(e.target.value);
});
