<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aducate English App - Speaking Test</title>

<link rel="icon" type="image/png" href="./img/Aducate English Classes Logo.png">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(-45deg,#b668df,#0d6efd,#e59c98,#ffcc00);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
    padding:20px;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    max-width:1000px;
    margin:auto;
}

.card{
    background:rgba(255,255,255,.95);
    border-radius:25px;
    padding:25px;
    margin-bottom:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.header{
    text-align:center;
    color:white;
    margin-bottom:20px;
}

.header h1{
    font-size:38px;
}

.student-box{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.info{
    background:#f5f7ff;
    padding:15px;
    border-radius:15px;
}

.info h3{
    color:#0d6efd;
}

.topic{
    text-align:center;
    font-size:22px;
    font-weight:bold;
    margin:20px 0;
}

.controls{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
}

button{
    border:none;
    padding:14px 24px;
    border-radius:15px;
    cursor:pointer;
    color:white;
    font-size:15px;
    font-weight:600;
}

.topicBtn{background:#0d6efd;}
.start{background:#28a745;}
.stop{background:#dc3545;}
.saveBtn{background:#6f42c1;}
.backBtn{background:#343a40;}

select{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ddd;
}

#output{
    min-height:250px;
    border:2px solid #ddd;
    border-radius:15px;
    padding:15px;
    margin-top:20px;
    background:white;
    text-align:left;
    line-height:1.7;
}

.progress{
    width:100%;
    height:18px;
    background:#eee;
    border-radius:20px;
    overflow:hidden;
    margin-top:15px;
}

.progress-bar{
    width:0%;
    height:100%;
    background:#0d6efd;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
    margin-top:20px;
}

.stat{
    background:#f5f7ff;
    padding:15px;
    border-radius:15px;
    text-align:center;
}

.stat h2{
    color:#0d6efd;
}

.resultCard{
    display:none;
}

@media(max-width:600px){

    .header h1{
        font-size:28px;
    }

    button{
        width:100%;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <h1>🎤 Speaking Exam</h1>
    <p>Aducate English App</p>
</div>

<div class="card">

<div class="student-box">

<div class="info">
    <h3>Student</h3>
    <p id="studentName">Loading...</p>
</div>

<div class="info">
    <h3>Select Time</h3>

    <select id="timeSelect">
        <option value="30">0.5 Minute</option>
        <option value="60">1 Minute</option>
        <option value="120">2 Minutes</option>
        <option value="180">3 Minutes</option>
        <option value="240">4 Minutes</option>
        <option value="300">5 Minutes</option>
    </select>
</div>

</div>

<div class="topic" id="topicText">
    Click Generate Topic
</div>

<div class="controls">
    <button class="topicBtn" onclick="generateTopic()">🎲 Generate Topic</button>
    <button class="start" onclick="startSpeaking()">🎤 Start</button>
    <button class="stop" onclick="stopSpeaking()">🛑 Stop</button>
    <button class="saveBtn" onclick="saveSpeakingResult()">💾 Save Result</button>
</div>

<h2 style="text-align:center;margin-top:20px;" id="timerText">
00:00
</h2>

<div class="progress">
    <div class="progress-bar" id="progressBar"></div>
</div>

<div class="stats">

<div class="stat">
    <h2 id="wordCount">0</h2>
    <p>Words</p>
</div>

<div class="stat">
    <h2 id="wpm">0</h2>
    <p>WPM</p>
</div>

<div class="stat">
    <h2 id="score">0</h2>
    <p>Score</p>
</div>

</div>

<div id="output">
Your speech will appear here...
</div>

</div>

<div class="card resultCard" id="resultCard">

<h2>Speaking Result</h2>
<br>

<div id="resultContent"></div>

</div>

<script>

const currentStudent = JSON.parse(
    localStorage.getItem("currentStudent")
);

document.getElementById("studentName").innerHTML =
    currentStudent?.name || "Student";

let transcript = "";
let recognition;
let currentTopic = "";
let timer;
let timeLeft = 0;
let totalTime = 0;
let wordCount = 0;
let wpm = 0;
let score = 0;

const topics = [
    "Describe your your self",
    "Describe your best friend",
    "Talk about your future goals",
    "Describe your family",
    "Describe your favorite teacher",
    "Describe your daily routine",
    "Describe your dream job",
    "Describe your favorite book",
    "Talk about your favorite festival",
    "Describe a memorable journey"
];
// =====================
// TOPIC GENERATOR
// =====================

function generateTopic(){

    currentTopic =
        topics[Math.floor(
            Math.random() * topics.length
        )];

    document.getElementById(
        "topicText"
    ).innerHTML = currentTopic;
}

// =====================
// SPEECH RECOGNITION
// =====================

if ('webkitSpeechRecognition' in window) {

    recognition =
        new webkitSpeechRecognition();

    recognition.continuous = true;

    recognition.interimResults = true;

    recognition.lang = "en-US";

    recognition.onresult = function(event){

        transcript = "";

        for(
            let i = 0;
            i < event.results.length;
            i++
        ){

            transcript +=
                event.results[i][0].transcript + " ";
        }

        document.getElementById(
            "output"
        ).innerHTML = transcript;

        updateStats();
    };

    recognition.onerror = function(e){

        console.log(e.error);

    };

} else {

    alert(
        "Speech Recognition not supported"
    );

}

// =====================
// START SPEAKING
// =====================

function startSpeaking(){

    if(currentTopic === ""){

        alert(
            "Please Generate Topic First"
        );

        return;
    }

    totalTime = parseInt(
        document.getElementById(
            "timeSelect"
        ).value
    );

    timeLeft = totalTime;

    startTimer();

    recognition.start();

}

// =====================
// STOP SPEAKING
// =====================

function stopSpeaking(){

    if(recognition){

        recognition.stop();

    }

    clearInterval(timer);

    updateStats();

}

// =====================
// TIMER
// =====================

function startTimer(){

    clearInterval(timer);

    timer = setInterval(() => {

        timeLeft--;

        let minutes =
            Math.floor(timeLeft / 60);

        let seconds =
            timeLeft % 60;

        document.getElementById(
            "timerText"
        ).innerHTML =
            String(minutes)
            .padStart(2,"0")
            +
            ":"
            +
            String(seconds)
            .padStart(2,"0");

        let progress =
            (
                (totalTime - timeLeft)
                /
                totalTime
            ) * 100;

        document.getElementById(
            "progressBar"
        ).style.width =
            progress + "%";

        if(timeLeft <= 0){

            stopSpeaking();

            alert(
                "Time Completed"
            );

        }

    },1000);

}

// =====================
// STATS
// =====================

function updateStats(){

    wordCount =
        transcript
        .trim()
        .split(/\s+/)
        .filter(Boolean)
        .length;

    let minutesSpent =
        (
            totalTime - timeLeft
        ) / 60;

    if(minutesSpent > 0){

        wpm =
            Math.round(
                wordCount /
                minutesSpent
            );

    }

    score =
        Math.min(
            100,
            Math.round(
                wordCount * 0.8
            )
        );

    document.getElementById(
        "wordCount"
    ).innerHTML =
        wordCount;

    document.getElementById(
        "wpm"
    ).innerHTML =
        wpm;

    document.getElementById(
        "score"
    ).innerHTML =
        score;
}
// =====================
// SAVE RESULT
// =====================

function saveSpeakingResult(){

    if(transcript.trim() === ""){

        alert(
            "Please speak first."
        );

        return;
    }

    let currentStudent =
        JSON.parse(
            localStorage.getItem(
                "currentStudent"
            )
        );

    if(!currentStudent){

        alert("Please Login First");

        return;
    }

    let students =
        JSON.parse(
            localStorage.getItem(
                "students"
            )
        ) || [];

    const result = {

        topic: currentTopic,

        answer: transcript,

        words: wordCount,

        wpm: wpm,

        score: score,

        status:
            score >= 50
            ? "PASS"
            : "FAIL",

        date:
            new Date()
            .toLocaleString()
    };

    students = students.map(s => {

        if(
            s.id === currentStudent.id
        ){

            if(
                !s.speakingResults
            ){
                s.speakingResults = [];
            }

            s.speakingResults.push(
                result
            );

        }

        return s;
    });

    localStorage.setItem(
        "students",
        JSON.stringify(
            students
        )
    );

    showResult(result);

    alert(
        "Speaking Result Saved Successfully"
    );
}

// =====================
// SHOW RESULT
// =====================

function showResult(result){

    document.getElementById(
        "resultCard"
    ).style.display =
        "block";

    document.getElementById(
        "resultContent"
    ).innerHTML = `

    <div style="
        background:#f8f9fa;
        padding:20px;
        border-radius:15px;
    ">

        <p>
        <b>Topic:</b>
        ${result.topic}
        </p>

        <br>

        <p>
        <b>Words:</b>
        ${result.words}
        </p>

        <br>

        <p>
        <b>WPM:</b>
        ${result.wpm}
        </p>

        <br>

        <p>
        <b>Score:</b>
        ${result.score}/100
        </p>

        <br>

        <p>
        <b>Status:</b>
        ${result.status}
        </p>

        <br>

        <p>
        <b>Date:</b>
        ${result.date}
        </p>

    </div>
    `;
}

// =====================
// AUTO TOPIC ON LOAD
// =====================

generateTopic();

</script>

</body>
</html>
