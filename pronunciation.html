<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spelling & Reading Practice</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f7fc;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
    background:#fff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#0d6efd;
    margin-bottom:20px;
}

.input-section{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.input-section input{
    flex:1;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

.input-section button{
    padding:12px 20px;
    border:none;
    background:#28a745;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

.display-box{
    min-height:120px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
    border-radius:12px;
    background:#eef5ff;
    border:2px solid #0d6efd;
    font-size:32px;
    font-weight:bold;
    margin-bottom:20px;
    word-break:break-word;
}

.buttons{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
}

.buttons button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:white;
    font-size:16px;
}

.speak{
    background:#0d6efd;
}

.prev{
    background:#6c757d;
}

.next{
    background:#198754;
}

.clear{
    background:#ffffff;
}

.list-box{
    margin-top:25px;
}

.list-box h3{
    margin-bottom:10px;
}

.list-box ul{
    list-style:none;
}

.list-box li{
    background:#f8f9fa;
    padding:10px;
    margin-bottom:5px;
    border-radius:6px;
}
</style>
</head>
<body>

<div class="container">

    <h1>Spelling & Reading Practice</h1>

    <div class="input-section">
        <input
            type="text"
            id="newText"
            placeholder="Enter spelling or sentence">
        <button onclick="addText()">Add</button>
    </div>
     <div class="buttons">
    <button class="clear" onclick="clearAll()"></button>
    </div>

    <div class="display-box" id="displayBox">
        Enter a spelling or sentence and click Add
    </div>

    <div class="buttons">
        <button class="speak" onclick="speakText()">🔊 Speak</button>
        <button class="prev" onclick="previousItem()">⬅ Previous</button>
        <button class="next" onclick="nextItem()">Next ➡</button>
    </div>

    <div class="list-box">
        <h3>Added Spellings / Sentences</h3>
        <ul id="list"></ul>
    </div>

</div>

<script>

let items = JSON.parse(localStorage.getItem("readingItems")) || [];
let currentIndex = -1;

function updateList(){
    const list = document.getElementById("list");
    list.innerHTML = "";

    items.forEach((item,index)=>{
        const li = document.createElement("li");
        li.textContent = (index + 1) + ". " + item;
        list.appendChild(li);
    });

    localStorage.setItem("readingItems", JSON.stringify(items));
}

function addText(){

    const input = document.getElementById("newText");
    const text = input.value.trim();

    if(text === ""){
        alert("Please enter a spelling or sentence");
        return;
    }

    items.push(text);
    currentIndex = items.length - 1;

    document.getElementById("displayBox").innerText = text;

    updateList();

    input.value = "";
}

function speakText(){

    const text =
        document.getElementById("displayBox").innerText;

    if(
        text === "Enter a spelling or sentence and click Add"
    ){
        return;
    }

    speechSynthesis.cancel();

    const speech =
        new SpeechSynthesisUtterance(text);

    speech.lang = "en-US";
    speech.rate = 0.8;

    speechSynthesis.speak(speech);
}

function nextItem(){

    if(items.length === 0) return;

    currentIndex++;

    if(currentIndex >= items.length){
        currentIndex = 0;
    }

    document.getElementById("displayBox").innerText =
        items[currentIndex];
}

function previousItem(){

    if(items.length === 0) return;

    currentIndex--;

    if(currentIndex < 0){
        currentIndex = items.length - 1;
    }

    document.getElementById("displayBox").innerText =
        items[currentIndex];
}

function clearAll(){

    if(!confirm("Delete all spellings and sentences?")){
        return;
    }

    items = [];
    currentIndex = -1;

    localStorage.removeItem("readingItems");

    document.getElementById("displayBox").innerText =
        "Enter a spelling or sentence and click Add";

    updateList();
}

updateList();

if(items.length > 0){
    currentIndex = 0;
    document.getElementById("displayBox").innerText =
        items[0];
}

</script>

</body>
</html>
