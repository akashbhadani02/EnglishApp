<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRO Reels App</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:black;
  overflow:hidden;
}

/* MAIN CONTAINER */
.container{
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
  scroll-behavior:smooth;
}

/* REEL */
.reel{
  height:100vh;
  position:relative;
  scroll-snap-align:start;
}

/* VIDEO */
video{
  width:100%;
  height:100%;
}

/* OVERLAY */
.overlay{
  position:absolute;
  bottom:20px;
  left:15px;
  color:white;
}

/* ACTIONS */
.actions{
  position:absolute;
  right:15px;
  bottom:120px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.btn{
  width:45px;
  height:45px;
  border-radius:50%;
  background:rgba(255,255,255,0.15);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  cursor:pointer;
  user-select:none;
}

.count{
  color:white;
  font-size:12px;
  text-align:center;
}

/* COMMENT BOX */
.commentBox{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  padding:10px;
}

.commentBox input{
  width:75%;
  padding:8px;
}

.commentBox button{
  padding:8px;
}

.comments{
  max-height:120px;
  overflow:auto;
  color:white;
  font-size:12px;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="container" id="container"></div>

<script>

const container = document.getElementById("container");

let videos = [
  "vid/1.mp4","vid/2.mp4","vid/3.mp4","vid/4.mp4","vid/5.mp4",
  "vid/6.mp4","vid/7.mp4","vid/8.mp4","vid/9.mp4","vid/10.mp4",
  "vid/11.mp4","vid/12.mp4","vid/13.mp4","vid/14.mp4","vid/15.mp4"
];

let likes = JSON.parse(localStorage.getItem("likes") || "{}");
let comments = JSON.parse(localStorage.getItem("comments") || "{}");

let index = 0;

/* CREATE REEL */
function createReel(src,i){

  if(!likes[i]) likes[i]=0;
  if(!comments[i]) comments[i]=[];

  const reel = document.createElement("div");
  reel.className = "reel";

  reel.innerHTML = `
    <video loop playsinline src="${src}"></video>

    <div class="overlay">
      <h3>PRO Reels</h3>
      <p>#viral #trending</p>
    </div>

    <div class="actions">

      <div>
        <div class="btn likeBtn">❤️</div>
        <div class="count" id="like${i}">${likes[i]}</div>
      </div>

      <div class="btn commentBtn">💬</div>

    </div>

    <div class="commentBox">
      <input placeholder="Add comment..." />
      <button>Post</button>

      <div class="comments" id="cmt${i}">
        ${comments[i].map(c=>`<div>• ${c}</div>`).join("")}
      </div>
    </div>
  `;

  /* LIKE */
  reel.querySelector(".likeBtn").onclick = () => {
    likes[i]++;
    localStorage.setItem("likes", JSON.stringify(likes));
    document.getElementById("like"+i).innerText = likes[i];
  };

  /* COMMENT */
  const box = reel.querySelector(".commentBox");
  reel.querySelector(".commentBtn").onclick = () => {
    box.style.display = box.style.display==="block" ? "none":"block";
  };

  const input = reel.querySelector("input");
  reel.querySelector("button").onclick = () => {
    if(input.value.trim()){
      comments[i].push(input.value);
      localStorage.setItem("comments", JSON.stringify(comments));

      document.getElementById("cmt"+i).innerHTML +=
        `<div>• ${input.value}</div>`;

      input.value="";
    }
  };

  container.appendChild(reel);
}

/* LOAD VIDEOS */
for(let i=0;i<videos.length;i++){
  createReel(videos[i], i);
}

/* AUTO PLAY ONLY ACTIVE VIDEO */
const observer = new IntersectionObserver((entries)=>{
  entries.forEach(e=>{
    const video = e.target.querySelector("video");

    if(e.isIntersecting){
      video.play();
    } else {
      video.pause();
    }
  });
},{threshold:0.8});

document.querySelectorAll(".reel").forEach(r=>{
  observer.observe(r);
});

/* ONE SWIPE LOCK (IMPORTANT) */
let isScrolling = false;

container.addEventListener("scroll", ()=>{
  if(isScrolling) return;

  isScrolling = true;

  setTimeout(()=>{
    const reels = document.querySelectorAll(".reel");

    reels.forEach(r=>{
      const rect = r.getBoundingClientRect();

      if(rect.top === 0){
        r.scrollIntoView({behavior:"smooth"});
      }
    });

    isScrolling = false;
  },120);
});

</script>

</body>
</html>
