<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Aducate English Classes - Typing Master</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #0f172a;
            color: #fff;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 1000px;
            max-width: 100%;
            background: #1e293b;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(0, 0, 0, .4);
        }

        h1 {
            text-align: center;
            margin-bottom: 15px;
        }

        .top {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        .card {
            background: #334155;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .card h3 {
            font-size: 14px;
            margin-bottom: 5px;
            color: #cbd5e1;
        }

        .card p {
            font-size: 22px;
            font-weight: bold;
        }

        input[type=text] {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .progress {
            height: 12px;
            background: #475569;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .bar {
            height: 100%;
            width: 0%;
            background: #22c55e;
            transition: .2s;
        }

        .paragraph {
            background: #334155;
            padding: 20px;
            border-radius: 12px;
            font-size: 22px;
            line-height: 2;
            margin-bottom: 15px;
            word-wrap: break-word;
        }

        .correct {
            color: #22c55e;
        }

        .wrong {
            color: #ef4444;
            background: #450a0a;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            font-size: 20px;
            border: none;
            outline: none;
            border-radius: 12px;
            resize: none;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            background: #3b82f6;
            color: #fff;
        }

        button:hover {
            opacity: .9;
        }

        .footer {
            margin-top: 15px;
            text-align: center;
            font-size: 18px;
        }

        @media(max-width:600px) {
            .paragraph {
                font-size: 18px;
            }

            textarea {
                font-size: 18px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>⌨ Aducate English Classes</h1>

        <input type="text" id="studentName" placeholder="Enter Student Name">

        <div class="top">

            <div class="card">
                <h3>Time</h3>
                <p id="time">60</p>
            </div>

            <div class="card">
                <h3>WPM</h3>
                <p id="wpm">0</p>
            </div>

            <div class="card">
                <h3>Accuracy</h3>
                <p id="accuracy">100%</p>
            </div>

            <div class="card">
                <h3>XP</h3>
                <p id="xp">0</p>
            </div>

            <div class="card">
                <h3>Level</h3>
                <p id="level">1</p>
            </div>

            <div class="card">
                <h3>Best WPM</h3>
                <p id="best">0</p>
            </div>

        </div>

        <div class="progress">
            <div class="bar" id="bar"></div>
        </div>

        <div class="paragraph" id="paragraph"></div>

        <textarea id="input" placeholder="Start typing here..."></textarea>

        <div class="buttons">
            <button onclick="restartGame()">Restart</button>
            <button onclick="nextParagraph()">Next Paragraph</button>
        </div>

        <div class="footer">
            🏆 Keep Practicing Every Day
        </div>
    </div>

    <script>

       const paragraphs = [
    "Learning English every day is one of the most effective ways to improve communication skills and build self confidence. Students who practice reading, writing, listening, and speaking regularly become more fluent over time. Reading books, newspapers, and articles helps increase vocabulary and improves grammar naturally. Watching educational videos and listening to English conversations also enhance pronunciation and understanding. Making mistakes is a normal part of learning, so students should never feel afraid to speak. Daily practice, patience, and consistency are the keys to success. With determination and regular effort, anyone can become a confident English speaker and communicate effectively with people from different countries around the world.",

    "Technology has completely transformed the way students learn and gain knowledge. Online classes, educational websites, mobile applications, and digital libraries provide unlimited learning opportunities. Students can watch video lessons, solve quizzes, attend live classes, and communicate with teachers from anywhere in the world. Technology also makes learning more interactive through animations, games, and virtual experiments. However, students should use technology wisely and avoid spending too much time on entertainment. A balanced approach helps improve productivity and academic performance. By using technology responsibly, learners can develop new skills, expand their knowledge, and prepare themselves for future careers in a rapidly changing world.",

    "Reading books is one of the best habits that anyone can develop throughout life. Books provide knowledge, improve imagination, strengthen vocabulary, and enhance critical thinking skills. Reading different types of books such as biographies, science, history, and fiction allows readers to understand various perspectives and cultures. Regular reading also improves concentration, memory, and writing ability. It helps students perform better in school and increases confidence during conversations. Even reading for just thirty minutes every day can make a significant difference over time. A person who enjoys reading continues learning throughout life and becomes more creative, informed, and successful.",

    "Practice is the foundation of success in every field of life. Whether someone wants to become a good student, athlete, musician, or programmer, regular practice is essential. Every small effort contributes to improvement and builds confidence. Making mistakes should never discourage anyone because mistakes provide valuable learning experiences. Successful people achieve their goals through discipline, patience, and continuous hard work. Consistency is more important than perfection because regular practice produces long-term results. By setting clear goals, maintaining a positive attitude, and working every day, anyone can overcome challenges and achieve personal and professional success in the future.",

    "Typing is an important skill for students and professionals in today's digital world. Fast and accurate typing helps save time while preparing assignments, writing emails, creating reports, and completing online examinations. Regular typing practice improves finger speed, reduces errors, and increases overall productivity. Maintaining the correct posture, keeping fingers on the home row keys, and avoiding looking at the keyboard help develop proper typing habits. Practicing daily for even fifteen to twenty minutes can produce noticeable improvement within a few weeks. Good typing skills make computer work easier, increase confidence, and provide valuable advantages in education and future careers.",

    "The best way to improve spoken English is through regular conversation and consistent practice. Students should speak English every day with friends, teachers, or family members whenever possible. Listening to English podcasts, watching movies with subtitles, reading aloud, and repeating sentences improve pronunciation and fluency. Learning new words daily and using them in conversations helps strengthen vocabulary. Confidence develops gradually through continuous speaking practice, even if mistakes are made. Every conversation becomes an opportunity to learn something new. With patience, dedication, and daily effort, anyone can become a fluent English speaker and communicate confidently in different situations.",

    "Confidence is one of the most valuable qualities a student can develop. It grows through preparation, practice, and positive thinking rather than luck. Students who believe in themselves participate actively in classrooms, express their ideas clearly, and perform better during interviews and presentations. Setting small achievable goals and celebrating progress helps increase motivation and self belief. Accepting failures as learning opportunities builds resilience and determination. Positive communication, healthy habits, and continuous learning also contribute to personal growth. A confident person inspires others, handles challenges calmly, and continues moving forward toward success with courage and determination."
];

        let currentText = "";
        let timer = 60;
        let started = false;
        let interval;
        let xp = 0;
        let level = 1;

        const paragraph = document.getElementById("paragraph");
        const input = document.getElementById("input");

        let bestScore = localStorage.getItem("bestWPM") || 0;
        document.getElementById("best").textContent = bestScore;

        /* ---------- WEB AUDIO SOUNDS ---------- */

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function beep(freq, duration, type = "sine", volume = 0.05) {

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = type;
            osc.frequency.value = freq;

            gain.gain.value = volume;

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();

            setTimeout(() => {
                osc.stop();
            }, duration);

        }

        function correctSound() { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = "square"; osc.frequency.setValueAtTime(1800, audioCtx.currentTime); gain.gain.setValueAtTime(0.15, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.03); }

        function wrongSound() { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = "sawtooth"; osc.frequency.setValueAtTime(180, audioCtx.currentTime); gain.gain.setValueAtTime(0.20, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.15); }

        function finishSound() { const notes = [700, 900, 1200, 1500]; notes.forEach((note, index) => { setTimeout(() => { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = "triangle"; osc.frequency.value = note; gain.gain.setValueAtTime(0.12, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.15); }, index * 120); }); }
        /* ---------- GAME ---------- */

        function loadParagraph() {

            currentText =
                paragraphs[Math.floor(Math.random() * paragraphs.length)];

            paragraph.innerHTML = currentText
                .split("")
                .map(ch => `<span>${ch}</span>`)
                .join("");

            input.value = "";
            timer = 300;

            document.getElementById("time").textContent = 300;
            document.getElementById("wpm").textContent = 0;
            document.getElementById("accuracy").textContent = "100%";
            document.getElementById("bar").style.width = "0%";

            clearInterval(interval);
            started = false;
        }

        input.addEventListener("input", () => {

            if (audioCtx.state === "suspended") {
                audioCtx.resume();
            }

            if (!started) {

                started = true;

                interval = setInterval(() => {

                    timer--;
                    document.getElementById("time").textContent = timer;

                    if (timer <= 0) {

                        clearInterval(interval);

                        input.disabled = true;

                        finishSound();

                        let finalWpm =
                            parseInt(document.getElementById("wpm").textContent);

                        if (finalWpm > bestScore) {

                            bestScore = finalWpm;
                            localStorage.setItem("bestWPM", bestScore);
                            document.getElementById("best").textContent = bestScore;

                        }

                    }

                }, 1000);

            }

            let chars = input.value.split("");
            let spans = paragraph.querySelectorAll("span");

            let correct = 0;

            spans.forEach((span, index) => {

                let typed = chars[index];

                if (typed == null) {
                    span.className = "";
                }
                else if (typed === span.innerText) {
                    span.className = "correct";
                    correct++;
                }
                else {
                    span.className = "wrong";
                }

            });

            if (chars.length > 0) {

                let last = chars.length - 1;

                if (chars[last] === currentText[last]) {
                    correctSound();
                } else {
                    wrongSound();
                }

            }

            let accuracy = Math.round(
                (correct / Math.max(chars.length, 1)) * 100
            );

            document.getElementById("accuracy").textContent =
                accuracy + "%";

            let words = input.value.trim()
                ? input.value.trim().split(/\s+/).length
                : 0;

            let elapsed = 60 - timer;

            let wpm = elapsed > 0
                ? Math.round(words / (elapsed / 60))
                : 0;

            document.getElementById("wpm").textContent = wpm;

            let progress =
                (input.value.length / currentText.length) * 100;

            document.getElementById("bar").style.width =
                Math.min(progress, 100) + "%";

            xp = correct;

            document.getElementById("xp").textContent = xp;

            level = Math.floor(xp / 50) + 1;

            document.getElementById("level").textContent = level;

            if (input.value === currentText) {

                finishSound();

                xp += 50;
                document.getElementById("xp").textContent = xp;

                setTimeout(() => {
                    nextParagraph();
                }, 1200);

            }

        });

        function restartGame() {

            input.disabled = false;
            loadParagraph();

        }

        function nextParagraph() {

            input.disabled = false;
            loadParagraph();

        }

        loadParagraph();

    </script>

</body>

</html>
